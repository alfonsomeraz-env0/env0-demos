environments:
  vpc:
    name: "VPC and Network"
    templateName: "vpc - workflow"

  db:
    name: "Database"
    templateName: "s3-bucket"
    requiresApproval: true
    needs:
      - vpc

  sg:
    name: "Security Group"
    templateName: "security group - workflow"
    needs:
      - vpc

  ec2:
    name: "EC2"
    templateName: "ec2 - workflow"
    needs:
      - db
      - sg

settings:
  environmentRemovalStrategy: destroy

