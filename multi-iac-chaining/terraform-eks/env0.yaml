version: 2

deploy:
  steps:
    terraformPlan:
      before:
        - name: Security Scan — Checkov
          run: |
            pip3 install checkov --quiet

            echo "================================================"
            echo "  SECURITY SCAN — Checkov (Terraform)"
            echo "================================================"
            checkov -d . \
              --framework terraform \
              --output cli \
              --compact \
              --quiet \
              || true
            echo "================================================"
            echo "  Scan complete. Review findings above."
            echo "================================================"

    terraformApply:
      after:
        - name: Post-Deploy Validation — Cluster Health
          run: |
            aws eks update-kubeconfig \
              --region "${TF_VAR_region:-us-east-1}" \
              --name "${TF_VAR_cluster_name:-multi-iac-demo}"

            echo "================================================"
            echo "  POST-DEPLOY VALIDATION"
            echo "================================================"

            echo ""
            echo "--- Nodes ---"
            kubectl get nodes -o wide

            echo ""
            echo "--- System pods ---"
            kubectl get pods -n kube-system --no-headers \
              | awk '{printf "  %-45s %s\n", $1, $3}'

            NOT_READY=$(kubectl get nodes --no-headers | grep -v " Ready" | wc -l)
            if [ "$NOT_READY" -gt 0 ]; then
              echo ""
              echo "WARNING: $NOT_READY node(s) not in Ready state"
            else
              echo ""
              echo "All nodes are Ready."
            fi
            echo "================================================"

        - name: Slack Notification — Deploy Complete
          run: |
            ENV=${ENV0_ENVIRONMENT_NAME:-eks-cluster}
            CLUSTER=${TF_VAR_cluster_name:-multi-iac-demo}
            REGION=${TF_VAR_region:-us-east-1}

            PAYLOAD=$(cat <<MSG
            {
              "text": "*[env0] EKS cluster deployed*",
              "attachments": [{
                "color": "#B8E500",
                "fields": [
                  { "title": "Environment", "value": "$ENV",     "short": true },
                  { "title": "Cluster",     "value": "$CLUSTER", "short": true },
                  { "title": "Region",      "value": "$REGION",  "short": true },
                  { "title": "Status",      "value": "SUCCESS",  "short": true }
                ]
              }]
            }
            MSG
            )

            if [ -n "$SLACK_WEBHOOK_URL" ]; then
              curl -s -X POST -H 'Content-type: application/json' \
                --data "$PAYLOAD" "$SLACK_WEBHOOK_URL"
              echo "Slack notification sent."
            else
              echo "SLACK_WEBHOOK_URL not configured — would have sent:"
              echo "$PAYLOAD"
            fi

destroy:
  steps:
    terraformDestroy:
      before:
        - name: Slack Notification — Destroy Starting
          run: |
            ENV=${ENV0_ENVIRONMENT_NAME:-eks-cluster}
            CLUSTER=${TF_VAR_cluster_name:-multi-iac-demo}

            PAYLOAD=$(cat <<MSG
            {
              "text": "*[env0] EKS cluster teardown started*",
              "attachments": [{
                "color": "#FFC60B",
                "fields": [
                  { "title": "Environment", "value": "$ENV",     "short": true },
                  { "title": "Cluster",     "value": "$CLUSTER", "short": true },
                  { "title": "Status",      "value": "DESTROYING", "short": true }
                ]
              }]
            }
            MSG
            )

            if [ -n "$SLACK_WEBHOOK_URL" ]; then
              curl -s -X POST -H 'Content-type: application/json' \
                --data "$PAYLOAD" "$SLACK_WEBHOOK_URL"
              echo "Slack notification sent."
            else
              echo "SLACK_WEBHOOK_URL not configured — would have sent:"
              echo "$PAYLOAD"
            fi
