version: 2

# ---------------------------------------------------------------------------
# Custom flow: fetch the merged PR's GitHub labels and write them into the
# policy-data file. env0's Approval Policy (OPA/Rego) reads this file and
# decides whether to auto-approve the deployment or hold it for a human.
#
# Runs in `terraformPlan.after` so the file exists before the approval policy
# is evaluated (policies run after plan, before apply).
#
# IMPORTANT: write the file into the WORKING DIRECTORY (a relative path), not
# /tmp. env0 runs the approval-policy check in a separate step from this one,
# and only the working-directory volume is shared between steps — /tmp is not,
# so a /tmp file yields "Failed to load dynamic policy data".
#
# Required env0 environment variables (set on the template or project):
#   GITHUB_ORG                  - e.g. "env0"
#   GITHUB_REPO                 - e.g. "env0-demos"
#   ENV0_POLICY_DATA_PATH       - RELATIVE path the policy reads: policy_data.json
# Token (optional — falls back automatically):
#   GITHUB_TOKEN   (sensitive)  - PAT with repo read. If unset, the flow uses
#                                 env0's built-in ENV0_VCS_ACCESS_TOKEN (the
#                                 token from your GitHub VCS connection), so no
#                                 extra PAT setup is needed in most cases.
# Optional for live demos (skips the API call and forces a label set):
#   DEMO_PR_NUMBER              - hardcode a PR number
#   DEMO_PR_LABELS              - JSON array, e.g. '["skip-approval"]'
#
# Label resolution order:
#   1. DEMO_PR_LABELS set            -> use those labels verbatim (no GitHub call)
#   2. DEMO_PR_NUMBER set            -> read labels from that PR
#   3. ENV0_GIT_REVISION has pull/N  -> read labels from PR N (PR-plan context)
#   4. otherwise (CD on merge/push)  -> read the deployed commit SHA from the
#      cloned repo and ask GitHub which PR contains it; that PR's labels are used.
# ---------------------------------------------------------------------------
deploy:
  steps:
    terraformPlan:
      after:
        - name: "Fetch PR Labels into policyData"
          run: |
            #!/bin/bash
            set -e

            # Default to a working-directory-relative file so it is shared with
            # the policy-check step. Override with ENV0_POLICY_DATA_PATH if needed.
            OUT="${ENV0_POLICY_DATA_PATH:-policy_data.json}"

            # --- Demo override: skip GitHub entirely and inject labels ---------
            if [ -n "$DEMO_PR_LABELS" ]; then
              echo "🎛️  DEMO_PR_LABELS override set — using injected labels"
              echo "{\"pr_labels\": $DEMO_PR_LABELS}" > "$OUT"
              cat "$OUT"
              exit 0
            fi

            # Use an explicit GITHUB_TOKEN if provided, otherwise fall back to
            # the token env0 already injects from your GitHub VCS connection.
            TOKEN="${GITHUB_TOKEN:-$ENV0_VCS_ACCESS_TOKEN}"
            if [ -z "$TOKEN" ]; then
              echo "ℹ️  No GITHUB_TOKEN or ENV0_VCS_ACCESS_TOKEN — calling GitHub unauthenticated (rate-limited)"
            fi

            API="https://api.github.com/repos/$GITHUB_ORG/$GITHUB_REPO"
            AUTH=(-H "Accept: application/vnd.github+json")
            [ -n "$TOKEN" ] && AUTH+=(-H "Authorization: token $TOKEN")
            LABELS=""

            # --- Resolve the PR number (explicit or PR-plan ref) --------------
            PR_NUMBER="$DEMO_PR_NUMBER"
            if [ -z "$PR_NUMBER" ]; then
              # In env0 PR-plan contexts the ref can look like refs/pull/123/merge.
              PR_NUMBER=$(echo "$ENV0_GIT_REVISION" | grep -oE 'pull/[0-9]+' | grep -oE '[0-9]+' || true)
            fi

            if [ -n "$PR_NUMBER" ]; then
              echo "🔎 Reading labels from PR #$PR_NUMBER"
              LABELS=$(curl -sf "${AUTH[@]}" "$API/issues/${PR_NUMBER}/labels" | jq -c '[.[].name]') || LABELS=""
            else
              # --- CD on merge/push: find the PR that contains the deployed SHA -
              SHA="${DEMO_COMMIT_SHA:-$(git rev-parse HEAD 2>/dev/null || true)}"
              if [ -n "$SHA" ]; then
                echo "🔎 Resolving PR for commit $SHA via commits/{sha}/pulls"
                LABELS=$(curl -sf "${AUTH[@]}" "$API/commits/${SHA}/pulls" \
                  | jq -c '[.[].labels[].name] | unique') || LABELS=""
              fi
            fi

            # Default to an empty set if nothing resolved.
            [ -n "$LABELS" ] && [ "$LABELS" != "null" ] || LABELS="[]"

            echo "🏷️  Resolved labels: $LABELS"
            echo "{\"pr_labels\": $LABELS}" > "$OUT"
            cat "$OUT"
