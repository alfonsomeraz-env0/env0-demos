version: 2

deploy:
  steps:
    terraformInit:
      after:
        - name: Verify modules
          run: |
            echo "Deploying Terragrunt stack: $ENV0_PROJECT_NAME"
            echo "Environment: $ENV0_ENVIRONMENT_NAME"
            echo "Region: us-east-2"


destroy:
  steps:
    terraformDestroy:
      after:
        - name: Confirm destroy complete
          run: echo "All modules destroyed in reverse dependency order"
