version: 2

deploy:
  steps:
    helmDiff:
      before:
        - name: Configure kubectl
          run: |
            aws eks update-kubeconfig --region "$AWS_REGION" --name "$CLUSTER_NAME" 2>/dev/null || {
              echo "Cluster not reachable — skipping kubeconfig setup for plan phase"
              exit 0
            }

    helmUpgrade:
      before:
        - name: Install kubectl
          run: |
            curl -LO "https://dl.k8s.io/release/$(curl -Ls https://dl.k8s.io/release/stable.txt)/bin/linux/amd64/kubectl"
            chmod +x kubectl && mv kubectl /usr/local/bin/kubectl
            kubectl version --client

        - name: Configure kubectl
          run: |
            aws eks update-kubeconfig --region "$AWS_REGION" --name "$CLUSTER_NAME"
            echo "Cluster nodes:"
            kubectl get nodes

        - name: Helm lint
          run: |
            helm lint . -f values.yaml -f "$VALUES_FILE" && echo "Lint passed."

      after:
        - name: Verify rollout
          run: |
            RELEASE_NAME=${HELM_RELEASE_NAME:-nginx-demo}
            NAMESPACE=${HELM_NAMESPACE:-default}
            echo "Waiting for rollout..."
            kubectl rollout status deployment \
              -l app.kubernetes.io/instance="$RELEASE_NAME" \
              -n "$NAMESPACE" \
              --timeout=120s

            echo ""
            echo "--- Pods ---"
            kubectl get pods -l app.kubernetes.io/instance="$RELEASE_NAME" -n "$NAMESPACE"

            echo ""
            echo "--- Service ---"
            kubectl get svc -l app.kubernetes.io/instance="$RELEASE_NAME" -n "$NAMESPACE"

destroy:
  steps:
    helmUninstall:
      before:
        - name: Install kubectl
          run: |
            curl -LO "https://dl.k8s.io/release/$(curl -Ls https://dl.k8s.io/release/stable.txt)/bin/linux/amd64/kubectl"
            chmod +x kubectl && mv kubectl /usr/local/bin/kubectl

        - name: Configure kubectl
          run: |
            aws eks update-kubeconfig --region "$AWS_REGION" --name "$CLUSTER_NAME"
