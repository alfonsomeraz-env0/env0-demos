environments:
  cluster:
    name: "EKS Cluster"
    templateName: "helm-promotion-cluster"

  dev:
    name: "nginx — dev"
    templateName: "helm-promotion-dev"
    needs:
      - cluster

  prod:
    name: "nginx — prod"
    templateName: "helm-promotion-prod"
    requiresApproval: true
    needs:
      - dev

settings:
  environmentRemovalStrategy: destroy
